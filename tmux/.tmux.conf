# --- Core settings ---
unbind C-b
set -g prefix C-Space
bind Space send-prefix

set -g mouse on
set -g default-terminal "tmux-256color"

# --- Window naming ---
set -g automatic-rename on
set -g automatic-rename-format "#{b:pane_current_path}"

# --- Keybindings ---
bind-key x kill-pane
bind-key t split-window -h -c "#{pane_current_path}" -p 30

# --- Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# --- Plugin config ---
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# --- Status bar (Rapture palette) ---
set -g status-style "bg=#1a2d40,fg=#c0c9e5"
set -g status-justify left
set -g status-left ""
set -g status-right "#[fg=#6c9bf5] #{b:pane_current_path} "
set -g status-right-length 50

set -g window-status-format "#[fg=#64e0ff] #I:#W "
set -g window-status-current-format "#[bg=#64e0ff,fg=#111e2a] #I:#W "
set -g window-status-separator ""

# --- Pane focus indication ---
set -g pane-border-style "fg=#304b66"
set -g pane-active-border-style "fg=#304b66"
set -g window-style "fg=#304b66,bg=#111e2a"
set -g window-active-style "fg=#c0c9e5,bg=#111e2a"

# Initialize TPM (keep last)
run '~/.tmux/plugins/tpm/tpm'
